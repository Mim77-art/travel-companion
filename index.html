  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            /* primary dùng CSS variables — đổi màu ở :root bên dưới */
            primary: {
              50:'var(--p50)', 100:'var(--p100)', 200:'var(--p200)', 300:'var(--p300)',
              400:'var(--p400)', 500:'var(--p500)', 600:'var(--p600)',
              700:'var(--p700)', 800:'var(--p800)', 900:'var(--p900)',
            },
          }
        }
      }
    }

  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /*
     * ╔══════════════════════════════════════════════════════╗
     * ║  🎨  CHỈNH UI TẠI ĐÂY — Design Tokens & Components  ║
     * ╚══════════════════════════════════════════════════════╝
     */

    /* ── 1. BRAND COLOR ─────────────────────────────────────
       Đổi --p500 = đổi toàn bộ màu chủ đạo của app          */
    :root {
      --p50:#e6fefe; --p100:#ccfdfd; --p200:#99fbfb; --p300:#66f6f6;
      --p400:#33dede; --p500:#33dede; --p600:#20c5c5;
      --p700:#0fa8a8; --p800:#0d8a8a; --p900:#0a6b6b;
    }

    /* ── 2. SURFACE COLORS (light mode) ─────────────────── */
    :root {
      --bg-app:     #fdf6ee;   /* nền kem ấm toàn trang    */
      --bg-card:    #fffdf8;   /* nền card                 */
      --bg-input:   #fef9f0;   /* nền ô nhập liệu          */
      --bg-hover:   #f5ede0;   /* hover background         */
      --text-base:  #2d1b0e;   /* nâu đậm                  */
      --text-sub:   #7a5c42;   /* nâu nhạt                 */
      --text-muted: #b08060;   /* muted warm               */
      --border:     #2d1b0e;   /* viền đậm kiểu brutalist  */
      --border-light: #e8d5bb; /* viền nhạt cho divider    */
      /* Accent colors */
      --accent-green:  #1e7b44;
      --accent-gold:   #f4c033;
      --accent-cream:  #feeaea;
    }

    /* ── 3. DARK MODE OVERRIDES ─────────────────────────── */
    .dark {
      --bg-app:     #1a0f07;
      --bg-card:    #2a1810;
      --bg-input:   #3a2418;
      --bg-hover:   #3a2418;
      --text-base:  #fdf6ee;
      --text-sub:   #c9a882;
      --text-muted: #8a6040;
      --border:     #c9a882;
      --border-light: #3a2418;
    }

    /* ── 4. SHAPE & SHADOW (neo-brutalist) ──────────────── */
    :root {
      --radius-sm:  0.625rem;  /* 10px */
      --radius-md:  1rem;      /* 16px */
      --radius-lg:  1.25rem;   /* 20px */
      /* Offset solid shadow — đặc trưng neo-brutalist */
      --shadow-sm:  3px 3px 0px var(--border);
      --shadow-md:  5px 5px 0px var(--border);
      --shadow-lg:  8px 8px 0px var(--border);
      --border-w:   2px;       /* độ dày viền              */
      --font-sm: 13px;
      --font-md: 14px;
    }

    /* ── 5. COMPONENT CLASSES ────────────────────────────── */

    /* Card — viền đậm + shadow offset */
    .ui-card {
      background: var(--bg-card);
      border-radius: var(--radius-md);
      border: var(--border-w) solid var(--border);
      box-shadow: var(--shadow-sm);
    }
    .ui-card-lg {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      border: var(--border-w) solid var(--border);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }

    /* Input — viền ấm + focus rõ ràng */
    .ui-input {
      width: 100%; padding: .75rem 1rem;
      border-radius: var(--radius-md);
      background: var(--bg-input);
      color: var(--text-base);
      border: var(--border-w) solid var(--border);
      box-shadow: var(--shadow-sm);
      outline: none;
      font-size: var(--font-md);
      font-family: inherit;
      transition: border-color .15s, box-shadow .15s, transform .1s;
    }
    .ui-input:focus {
      border-color: var(--p500);
      box-shadow: 3px 3px 0 var(--p500);
      transform: translate(-1px, -1px);
    }
    .ui-input-sm {
      padding: .5rem .75rem;
      border-radius: var(--radius-sm);
      font-size: var(--font-sm);
    }

    /* Buttons — solid offset shadow, viền đậm */
    .ui-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: .375rem;
      padding: .65rem 1.1rem;
      border-radius: var(--radius-md);
      font-weight: 700; font-size: var(--font-md);
      border: var(--border-w) solid var(--border);
      cursor: pointer;
      transition: transform .1s, box-shadow .1s;
      box-shadow: var(--shadow-sm);
      font-family: inherit;
    }
    .ui-btn:hover  { transform: translate(-1px,-1px); box-shadow: var(--shadow-md); }
    .ui-btn:active { transform: translate(2px,2px);   box-shadow: none; }
    .ui-btn-primary { background: var(--p500); color: #1a3a3a; border-color: var(--p700); box-shadow: 4px 4px 0 var(--p700); }
    .ui-btn-primary:hover { box-shadow: 6px 6px 0 var(--p700); }
    .ui-btn-primary:active { box-shadow: none; }
    .ui-btn-ghost   { background: var(--bg-card); color: var(--text-base); }
    .ui-btn-ghost:hover { background: var(--bg-hover); }
    .ui-btn-danger  { background: #fef2f2; color: #b91c1c; border-color: #b91c1c; box-shadow: 3px 3px 0 #b91c1c; }
    .dark .ui-btn-danger { background: #3a1010; color: #fca5a5; border-color: #fca5a5; box-shadow: 3px 3px 0 #7f1d1d; }
    .ui-btn-icon {
      padding: .375rem; border-radius: var(--radius-sm);
      display: inline-flex; align-items: center; justify-content: center;
      background: transparent; border: none; cursor: pointer;
      transition: background .12s;
    }
    .ui-btn-icon:hover { background: var(--bg-hover); }

    /* Section label */
    .ui-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--text-muted);
    }
    /* Muted text */
    .ui-muted { color: var(--text-muted); font-size: var(--font-sm); }

    /*
     * ╔══════════════════════════════════════════════════════╗
     * ║  ⚙️  KHÔNG CẦN CHỈNH BÊN DƯỚI — App internals       ║
     * ╚══════════════════════════════════════════════════════╝
     */
    * { -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Quicksand', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-app);
      /* dot grid pattern giống trang mẫu */
      background-image: radial-gradient(var(--border-light) 1.5px, transparent 1.5px);
      background-size: 24px 24px;
    }
    .dark body, body.dark {
      background-image: radial-gradient(#3a2418 1.5px, transparent 1.5px);
    }
    .tab-content { animation: fadeIn 0.2s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(100%); } to { opacity: 1; transform: translateY(0); } }
    @keyframes toastIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    .modal-overlay { animation: fadeIn 0.2s ease; }
    .modal-content { animation: slideUp 0.3s ease; }
    .toast-anim { animation: toastIn 0.3s ease; }
    .drag-over { border: 2px dashed var(--p500) !important; background: rgb(124 58 237/.1) !important; }
    input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.5); }
    .dark input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1); }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 4px; }
    .dark ::-webkit-scrollbar-thumb { background: var(--p700); }
  </style>

        baseCurrency: 'Base currency', rate: 'Rate', addRate: 'Add rate',

        menu: 'Food', breakfast: 'Breakfast', lunch: 'Lunch', dinner: 'Dinner',
      }
    };

    // ==================== INITIAL STATE ====================
    const defaultState = {
      trip: { name: 'Chuyến đi mới', startDate: '', endDate: '', baseCurrency: 'VND', exchangeRates: [], fund: 0 },
      members: [{ id: '1', name: 'Mim', avatar: '🎨' }],
      expenses: [],
      photos: [],
      places: [],
      schedule: [],
      packingList: [],
      emergencyContacts: [],
      menuItems: [],
      history: [],
      settings: { theme: 'auto', language: 'vi' }
    };

    function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 5); }

    // ==================== REDUCER ====================
    function appReducer(state, action) {
      switch (action.type) {
        case 'LOAD_STATE': return { ...defaultState, ...action.payload };
        case 'SET_TRIP': return { ...state, trip: { ...state.trip, ...action.payload } };
        case 'SET_SETTINGS': return { ...state, settings: { ...state.settings, ...action.payload } };
        // Members
        case 'ADD_MEMBER': return { ...state, members: [...state.members, { id: generateId(), ...action.payload }] };
        case 'UPDATE_MEMBER': return { ...state, members: state.members.map(m => m.id === action.payload.id ? { ...m, ...action.payload } : m) };
        case 'DELETE_MEMBER': return { ...state, members: state.members.filter(m => m.id !== action.payload) };
        // Expenses
        case 'ADD_EXPENSE': return { ...state, expenses: [...state.expenses, { id: generateId(), ...action.payload }] };
        case 'UPDATE_EXPENSE': return { ...state, expenses: state.expenses.map(e => e.id === action.payload.id ? { ...e, ...action.payload } : e) };
        case 'DELETE_EXPENSE': return { ...state, expenses: state.expenses.filter(e => e.id !== action.payload) };
        // Photos
        case 'ADD_PHOTO': return { ...state, photos: [...state.photos, { id: generateId(), ...action.payload }] };
        case 'UPDATE_PHOTO': return { ...state, photos: state.photos.map(p => p.id === action.payload.id ? { ...p, ...action.payload } : p) };
        case 'DELETE_PHOTO': return { ...state, photos: state.photos.filter(p => p.id !== action.payload) };
        // Places
        case 'ADD_PLACE': return { ...state, places: [...state.places, { id: generateId(), ...action.payload }] };
        case 'UPDATE_PLACE': return { ...state, places: state.places.map(p => p.id === action.payload.id ? { ...p, ...action.payload } : p) };
        case 'DELETE_PLACE': return { ...state, places: state.places.filter(p => p.id !== action.payload) };
        // Schedule
        case 'ADD_EVENT': return { ...state, schedule: [...state.schedule, { id: generateId(), ...action.payload }] };
        case 'UPDATE_EVENT': return { ...state, schedule: state.schedule.map(e => e.id === action.payload.id ? { ...e, ...action.payload } : e) };
        case 'DELETE_EVENT': return { ...state, schedule: state.schedule.filter(e => e.id !== action.payload) };
        case 'REORDER_EVENTS': return { ...state, schedule: action.payload };
        // Packing
        case 'ADD_PACKING': return { ...state, packingList: [...state.packingList, { id: generateId(), ...action.payload }] };
        case 'UPDATE_PACKING': return { ...state, packingList: state.packingList.map(i => i.id === action.payload.id ? { ...i, ...action.payload } : i) };
        case 'DELETE_PACKING': return { ...state, packingList: state.packingList.filter(i => i.id !== action.payload) };
        case 'BULK_ADD_PACKING': return { ...state, packingList: [...state.packingList, ...action.payload.map(i => ({ id: generateId(), ...i }))] };
        // Emergency
        case 'ADD_CONTACT': return { ...state, emergencyContacts: [...state.emergencyContacts, { id: generateId(), ...action.payload }] };
        case 'UPDATE_CONTACT': return { ...state, emergencyContacts: state.emergencyContacts.map(c => c.id === action.payload.id ? { ...c, ...action.payload } : c) };
        case 'DELETE_CONTACT': return { ...state, emergencyContacts: state.emergencyContacts.filter(c => c.id !== action.payload) };
        case 'ADD_MENU_ITEM': return { ...state, menuItems: [...(state.menuItems || []), { id: generateId(), ...action.payload }] };
        case 'UPDATE_MENU_ITEM': return { ...state, menuItems: (state.menuItems || []).map(m => m.id === action.payload.id ? { ...m, ...action.payload } : m) };
        case 'DELETE_MENU_ITEM': return { ...state, menuItems: (state.menuItems || []).filter(m => m.id !== action.payload) };
        // Exchange rates
        case 'SET_RATES': return { ...state, trip: { ...state.trip, exchangeRates: action.payload } };
        // History
        case 'ADD_HISTORY': return { ...state, history: [action.payload, ...(state.history || [])].slice(0, 200) };
        case 'CLEAR_HISTORY': return { ...state, history: [] };
        case 'CLEAR_ALL': return { ...defaultState, settings: state.settings };
        default: return state;
      }
    }

    // History-aware dispatch wrapper
    const historyLabels = {
      ADD_EXPENSE: { icon: '💰', text: 'Thêm chi tiêu' },
      UPDATE_EXPENSE: { icon: '✏️', text: 'Sửa chi tiêu' },
      DELETE_EXPENSE: { icon: '🗑️', text: 'Xóa chi tiêu' },
      ADD_MEAL: { icon: '🍽️', text: 'Thêm món ăn' },
      UPDATE_MEAL: { icon: '✏️', text: 'Sửa món ăn' },
      DELETE_MEAL: { icon: '🗑️', text: 'Xóa món ăn' },
    };

    function getHistoryDetail(type, payload) {
      if (!payload) return '';
      if (typeof payload === 'string') return '';
      return payload.title || payload.name || payload.item || payload.dish || '';
    }

    // ==================== CONTEXTS ====================
    const AppContext = createContext();
    const ToastContext = createContext();

    // ==================== TOAST ====================
    function ToastProvider({ children }) {
      const [toasts, setToasts] = useState([]);
      const addToast = useCallback((message, type = 'success') => {
        const id = generateId();
        setToasts(prev => [...prev, { id, message, type }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 2500);
      }, []);
      return (
        <ToastContext.Provider value={addToast}>
          {children}
          <div className="fixed top-4 right-4 z-[100] flex flex-col gap-2">
            {toasts.map(t => (
              <div key={t.id} className="toast-anim px-4 py-2 rounded-lg text-sm font-bold"
                style={{background: t.type==='error' ? '#ef4444' : t.type==='warning' ? '#f59e0b' : '#8b5c3a', color:'var(--bg-card)', border:'2px solid #5c3320', boxShadow:'3px 3px 0 #5c3320'}}>
                {t.message}
              </div>
            ))}
          </div>
        </ToastContext.Provider>
      );

    // ==================== PALETTE EXTRACTION ====================
    function extractPalette(imageDataUrl, numColors = 6) {
      return new Promise((resolve) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const sz = 50;
          canvas.width = sz; canvas.height = sz;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, sz, sz);
          const data = ctx.getImageData(0, 0, sz, sz).data;
          const pixels = [];
          for (let i = 0; i < data.length; i += 4) {
            pixels.push([data[i], data[i+1], data[i+2]]);
          }
          // Simple K-means
          let centers = [];
          for (let i = 0; i < numColors; i++) {
            centers.push(pixels[Math.floor(Math.random() * pixels.length)].slice());
          }
          for (let iter = 0; iter < 10; iter++) {
            const clusters = Array.from({ length: numColors }, () => []);
            pixels.forEach(p => {
              let minD = Infinity, minI = 0;
              centers.forEach((c, ci) => {
                const d = (p[0]-c[0])**2 + (p[1]-c[1])**2 + (p[2]-c[2])**2;
                if (d < minD) { minD = d; minI = ci; }
              });
              clusters[minI].push(p);
            });
            centers = clusters.map((cl, i) => {
              if (cl.length === 0) return centers[i];
              return [
                Math.round(cl.reduce((s, p) => s + p[0], 0) / cl.length),
                Math.round(cl.reduce((s, p) => s + p[1], 0) / cl.length),
                Math.round(cl.reduce((s, p) => s + p[2], 0) / cl.length),
              ];
            });
          }
          const hexColors = centers.map(c => '#' + c.map(v => v.toString(16).padStart(2, '0')).join(''));
          // Sort by brightness
          hexColors.sort((a, b) => {
            const bri = hex => { const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), bl = parseInt(hex.slice(5,7),16); return r*0.299+g*0.587+bl*0.114; };
            return bri(a) - bri(b);
          });
          resolve(hexColors);
        };
        img.src = imageDataUrl;
      });
    }

    // ==================== SETTLEMENT CALCULATOR ====================
    function calculateSettlement(expenses, members) {
      const balances = {};
      members.forEach(m => balances[m.id] = 0);
      expenses.forEach(exp => {
        const splitMembers = exp.splitAmong || [];
        if (splitMembers.length === 0) return;
        if (exp.paidBy === '__all__') {
          // Everyone paid equally — no balance change needed (self-paid)
          return;
        }
        if (exp.splitType === 'custom' && exp.customAmounts) {
          Object.entries(exp.customAmounts).forEach(([mid, amt]) => {
            balances[mid] = (balances[mid] || 0) - parseFloat(amt || 0);
          });
          balances[exp.paidBy] = (balances[exp.paidBy] || 0) + parseFloat(exp.amount);
        } else {
          const share = parseFloat(exp.amount) / splitMembers.length;
          splitMembers.forEach(mid => {
            balances[mid] = (balances[mid] || 0) - share;
          });
          balances[exp.paidBy] = (balances[exp.paidBy] || 0) + parseFloat(exp.amount);
        }
      });
      // Greedy settlement
      const debtors = [], creditors = [];
      Object.entries(balances).forEach(([id, bal]) => {
        if (bal < -0.01) debtors.push({ id, amount: -bal });
        else if (bal > 0.01) creditors.push({ id, amount: bal });
      });
      debtors.sort((a, b) => b.amount - a.amount);
      creditors.sort((a, b) => b.amount - a.amount);
      const txns = [];
      let di = 0, ci = 0;
      while (di < debtors.length && ci < creditors.length) {
        const amt = Math.min(debtors[di].amount, creditors[ci].amount);
        txns.push({ from: debtors[di].id, to: creditors[ci].id, amount: Math.round(amt) });
        debtors[di].amount -= amt;
        creditors[ci].amount -= amt;
        if (debtors[di].amount < 0.01) di++;
        if (creditors[ci].amount < 0.01) ci++;
      }
      return { balances, txns };
    }

    // Proportional settlement: each debtor pays every creditor by ratio
    function calculateSettlementProportional(expenses, members) {
      const balances = {};
      members.forEach(m => balances[m.id] = 0);
      expenses.forEach(exp => {
        const splitMembers = exp.splitAmong || [];
        if (splitMembers.length === 0) return;
        if (exp.paidBy === '__all__') return;
        if (exp.splitType === 'custom' && exp.customAmounts) {
          Object.entries(exp.customAmounts).forEach(([mid, amt]) => {
            balances[mid] = (balances[mid] || 0) - parseFloat(amt || 0);
          });
          balances[exp.paidBy] = (balances[exp.paidBy] || 0) + parseFloat(exp.amount);
        } else {
          const share = parseFloat(exp.amount) / splitMembers.length;
          splitMembers.forEach(mid => { balances[mid] = (balances[mid] || 0) - share; });
          balances[exp.paidBy] = (balances[exp.paidBy] || 0) + parseFloat(exp.amount);
        }
      });
      const debtors = [], creditors = [];
      Object.entries(balances).forEach(([id, bal]) => {
        if (bal < -0.01) debtors.push({ id, amount: -bal });
        else if (bal > 0.01) creditors.push({ id, amount: bal });
      });
      const totalCredit = creditors.reduce((s, c) => s + c.amount, 0);
      const txns = [];
      debtors.forEach(debtor => {
        creditors.forEach(creditor => {
          const amt = Math.round(debtor.amount * (creditor.amount / totalCredit));
          if (amt > 0) txns.push({ from: debtor.id, to: creditor.id, amount: amt });
        });
      });
      return { balances, txns };
    }

                memberShares[m.id] = e.splitType === 'custom' && e.customAmounts?.[m.id]

              return { ...e, catLabel: catLabel[e.category] || e.category, payerId: e.paidBy, memberShares };

    // ==================== TAB: ALBUM ====================
    function AlbumTab() {
      const { state, dispatch, t } = useContext(AppContext);
      const toast = useContext(ToastContext);
      const [lightbox, setLightbox] = useState(null);
      const [deleteConfirm, setDeleteConfirm] = useState(null);
      const fileRef = useRef();

      const handleUpload = async (e) => {
        const files = Array.from(e.target.files);
        for (const file of files) {
          if (file.size > 2 * 1024 * 1024) { toast('Ảnh quá lớn (max 2MB)', 'warning'); continue; }
          const reader = new FileReader();
          reader.onload = async (ev) => {
            const dataUrl = ev.target.result;
            try {
              const palette = await extractPalette(dataUrl);
              dispatch({ type: 'ADD_PHOTO', payload: { dataUrl, palette, caption: '', date: new Date().toISOString().split('T')[0] } });
              toast(t.copied.replace('copy', 'thêm ảnh'));
            } catch { dispatch({ type: 'ADD_PHOTO', payload: { dataUrl, palette: [], caption: '', date: new Date().toISOString().split('T')[0] } }); }
          };
          reader.readAsDataURL(file);
        }
        e.target.value = '';
      };

      const copyHex = (hex) => {
        navigator.clipboard.writeText(hex).then(() => toast(`${t.copied} ${hex}`));
      };

      return (
        <div className="tab-content pb-20">
          <p className="text-xs text-center text-gray-400 mt-3">{t.photoWarning}</p>
          {state.photos.length === 0 ? <EmptyState icon="Image" message={t.noPhotos} /> : (
            <div className="grid grid-cols-2 gap-2 mx-4 mt-4">
              {state.photos.map(photo => (
                <div key={photo.id} onClick={() => setLightbox(photo)} className="cursor-pointer group relative rounded-xl overflow-hidden aspect-square bg-gray-100 dark:bg-slate-800">
                  <img src={photo.dataUrl} className="w-full h-full object-cover group-hover:scale-105 transition-transform" alt="" />
                  {photo.palette?.length > 0 && (
                    <div className="absolute bottom-0 left-0 right-0 flex h-2">
                      {photo.palette.map((c, i) => <div key={i} style={{ backgroundColor: c, flex: 1 }} />)}
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}

          <input ref={fileRef} type="file" accept="image/*" multiple className="hidden" onChange={handleUpload} />
          <Fab onClick={() => fileRef.current?.click()} icon="Camera" />

          {/* Lightbox */}
          {lightbox && (
            <div className="fixed inset-0 bg-black/90 z-50 flex flex-col" onClick={() => setLightbox(null)}>
              <div className="flex items-center justify-between p-4">
                <button onClick={(e) => { e.stopPropagation(); setDeleteConfirm(lightbox.id); }} className="text-white/70 hover:text-red-400"><Icon name="Trash2" size={20} /></button>
                <button onClick={() => setLightbox(null)} className="text-white/70 hover:text-white"><Icon name="X" size={24} /></button>
              </div>
              <div className="flex-1 flex items-center justify-center p-4" onClick={e => e.stopPropagation()}>
                <img src={lightbox.dataUrl} className="max-w-full max-h-full object-contain rounded-lg" alt="" />
              </div>
              {lightbox.palette?.length > 0 && (
                <div className="p-4" onClick={e => e.stopPropagation()}>
                  <p className="text-white/60 text-xs mb-2 text-center">{t.palette} — tap to copy</p>
                  <div className="flex justify-center gap-3">
                    {lightbox.palette.map((color, i) => (
                      <button key={i} onClick={() => copyHex(color)} className="flex flex-col items-center gap-1 group">
                        <div className="w-10 h-10 rounded-lg shadow-lg border-2 border-white/20 group-active:scale-90 transition-transform" style={{ backgroundColor: color }} />
                        <span className="text-[10px] text-white/50 font-mono">{color}</span>
                      </button>
                    ))}
                  </div>
                </div>
              )}
              {/* Caption edit */}
              <div className="p-4 pt-0" onClick={e => e.stopPropagation()}>
                <input className="w-full px-3 py-2 rounded-lg bg-white/10 text-white text-sm text-center outline-none placeholder-white/30" placeholder={t.caption} value={lightbox.caption || ''} onChange={e => { const val = e.target.value; setLightbox(l => ({...l, caption: val})); dispatch({ type: 'UPDATE_PHOTO', payload: { id: lightbox.id, caption: val } }); }} />
              </div>
            </div>
          )}
          <ConfirmDialog isOpen={!!deleteConfirm} onClose={() => setDeleteConfirm(null)} onConfirm={() => { dispatch({ type: 'DELETE_PHOTO', payload: deleteConfirm }); setLightbox(null); toast('Đã xóa'); }} message={`${t.delete}?`} />
        </div>
      );
    }

    // ==================== TAB: SCHEDULE ====================
    function ScheduleTab() {
      const { state, dispatch, t } = useContext(AppContext);
      const toast = useContext(ToastContext);
      const [showModal, setShowModal] = useState(false);
      const [editing, setEditing] = useState(null);
      const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
      const [deleteConfirm, setDeleteConfirm] = useState(null);
      const [dragIdx, setDragIdx] = useState(null);
      const [form, setForm] = useState({ title: '', date: '', startTime: '', endTime: '', placeId: '', mapLink: '', note: '' });

      const dayEvents = useMemo(() =>
        state.schedule.filter(e => e.date === selectedDate).sort((a, b) => (a.order ?? 0) - (b.order ?? 0)),
        [state.schedule, selectedDate]
      );

      const openAdd = (slotFrom = '') => { setEditing(null); setForm({ title: '', date: selectedDate, startTime: slotFrom, endTime: '', placeId: '', mapLink: '', note: '' }); setShowModal(true); };
      const openEdit = (ev) => { setEditing(ev.id); setForm({ ...ev }); setShowModal(true); };
      const handleSave = () => {
        const place = form.placeId ? state.places.find(p => p.id === form.placeId) : null;
        const autoTitle = place?.name || form.note?.split('\n')[0] || '(Chưa đặt tên)';
        const finalForm = { ...form, title: form.title || autoTitle };
        const order = dayEvents.length;
        if (editing) dispatch({ type: 'UPDATE_EVENT', payload: { ...finalForm, id: editing } });
        else dispatch({ type: 'ADD_EVENT', payload: { ...finalForm, order } });
        setShowModal(false); toast(editing ? 'Đã cập nhật' : 'Đã thêm');
      };

      const handleDragStart = (idx) => setDragIdx(idx);
      const handleDragOver = (e, idx) => { e.preventDefault(); e.currentTarget.classList.add('drag-over'); };
      const handleDragLeave = (e) => e.currentTarget.classList.remove('drag-over');
      const handleDrop = (e, dropIdx) => {
        e.currentTarget.classList.remove('drag-over');
        if (dragIdx === null || dragIdx === dropIdx) return;
        const newEvents = [...dayEvents];
        const [moved] = newEvents.splice(dragIdx, 1);
        newEvents.splice(dropIdx, 0, moved);
        const reordered = newEvents.map((ev, i) => ({ ...ev, order: i }));
        const otherEvents = state.schedule.filter(e => e.date !== selectedDate);
        dispatch({ type: 'REORDER_EVENTS', payload: [...otherEvents, ...reordered] });
        setDragIdx(null);
      };

      const changeDate = (offset) => {
        const d = new Date(selectedDate);
        d.setDate(d.getDate() + offset);
        setSelectedDate(d.toISOString().split('T')[0]);
      };

      const getPlace = (id) => state.places.find(p => p.id === id);

      const timeSlots = [
        { key: 'morning',   icon: '🌅', label: 'Sáng',  from: '05:00', to: '09:59' },
        { key: 'noon',      icon: '☀️', label: 'Trưa',  from: '10:00', to: '12:59' },
        { key: 'afternoon', icon: '🌤️', label: 'Chiều', from: '13:00', to: '17:59' },
        { key: 'evening',   icon: '🌙', label: 'Tối',   from: '18:00', to: '23:59' },
      ];

      const getSlotKey = (startTime) => {
        if (!startTime) return 'morning';
        if (startTime >= '05:00' && startTime <= '09:59') return 'morning';
        if (startTime >= '10:00' && startTime <= '12:59') return 'noon';
        if (startTime >= '13:00' && startTime <= '17:59') return 'afternoon';
        if (startTime >= '18:00') return 'evening';
        return 'morning'; // 00:00–04:59
      };

      const slotedEvents = timeSlots.map(slot => ({
        ...slot,
        events: dayEvents.filter(ev => getSlotKey(ev.startTime) === slot.key)
          .sort((a, b) => (a.startTime || '').localeCompare(b.startTime || '') || (a.order ?? 0) - (b.order ?? 0))
      }));

      return (
        <div className="tab-content pb-20">
          {/* Date navigation */}
          <div className="flex items-center justify-between mx-4 mt-4 bg-white dark:bg-slate-800 rounded-xl p-3 shadow-sm">
            <button onClick={() => changeDate(-1)} className="p-2 hover:bg-gray-100 dark:hover:bg-slate-700 rounded-lg"><Icon name="ChevronLeft" size={20} /></button>
            <div className="text-center">
              <input type="date" value={selectedDate} onChange={e => setSelectedDate(e.target.value)} className="bg-transparent text-center font-bold outline-none cursor-pointer" />
              <p className="text-xs text-gray-400">{new Date(selectedDate).toLocaleDateString('vi-VN', { weekday: 'long' })}</p>
            </div>
            <button onClick={() => changeDate(1)} className="p-2 hover:bg-gray-100 dark:hover:bg-slate-700 rounded-lg"><Icon name="ChevronRight" size={20} /></button>
          </div>

          {dayEvents.length === 0 ? <EmptyState icon="Calendar" message={t.noEvents} /> : (
            <div className="mx-4 mt-4 space-y-4">
              {slotedEvents.map(slot => (
                <div key={slot.key} className="ui-card-lg">
                  {/* Slot header */}
                  <div className="flex items-center justify-between px-4 py-2.5 border-b border-gray-50 dark:border-slate-700">
                    <div className="flex items-center gap-2">
                      <span className="text-base">{slot.icon}</span>
                      <span className="font-semibold text-sm">{slot.label}</span>
                      {slot.from && <span className="text-[10px] text-gray-400">{slot.from} – {slot.to}</span>}
                      {slot.events.length > 0 && <span className="text-xs text-gray-400 bg-gray-100 dark:bg-slate-700 px-2 py-0.5 rounded-full">{slot.events.length}</span>}
                    </div>
                    <button onClick={() => openAdd(slot.from)} className="text-primary-500 p-1 hover:bg-primary-50 dark:hover:bg-primary-900/30 rounded-lg"><Icon name="Plus" size={16} /></button>
                  </div>
                  {slot.events.length === 0 ? (
                    <div className="px-4 py-3 text-center text-xs text-gray-400">Trống</div>
                  ) : (
                    <div className="divide-y divide-gray-50 dark:divide-slate-700">
                      {slot.events.map((ev, idx) => {
                        const globalIdx = dayEvents.findIndex(e => e.id === ev.id);
                        return (
                          <div key={ev.id} draggable
                            onDragStart={() => handleDragStart(globalIdx)}
                            onDragOver={e => handleDragOver(e, globalIdx)}
                            onDragLeave={handleDragLeave}
                            onDrop={e => handleDrop(e, globalIdx)}
                            className="flex items-center gap-3 px-4 py-3 cursor-grab active:cursor-grabbing transition-all border-2 border-transparent hover:bg-gray-50 dark:hover:bg-slate-700/50">
                            <div className="text-gray-300 dark:text-slate-600 flex-shrink-0"><Icon name="GripVertical" size={14} /></div>
                            <div className="w-1 h-8 bg-primary-400 rounded-full flex-shrink-0" />
                            <div className="flex-1 min-w-0" onClick={() => openEdit(ev)}>
                              <p className="font-medium text-sm truncate">{ev.title}</p>
                              <div className="flex flex-wrap items-center gap-x-2 gap-y-0.5 text-xs text-gray-400 mt-0.5">
                                {ev.startTime && <span>🕐 {ev.startTime}{ev.endTime ? ` – ${ev.endTime}` : ''}</span>}
                                {ev.placeId && getPlace(ev.placeId) && <span>📍 {getPlace(ev.placeId).name}</span>}
                                {!ev.placeId && ev.note && <span className="truncate">💬 {ev.note}</span>}
                              </div>
                            </div>
                            {(ev.mapLink || (ev.placeId && getPlace(ev.placeId)?.mapLink)) && (
                              <a href={ev.mapLink || getPlace(ev.placeId)?.mapLink} target="_blank" rel="noopener"
                                onClick={e => e.stopPropagation()}
                                className="p-1.5 rounded-lg bg-green-50 dark:bg-green-900/30 text-green-500 flex-shrink-0">
                                <Icon name="Map" size={14} />
                              </a>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}
          <Fab onClick={openAdd} />

          <Modal isOpen={showModal} onClose={() => setShowModal(false)} title={editing ? t.edit : t.addEvent}>
            <div className="space-y-4">

    // ==================== TAB: CHECKLIST ====================
    function ChecklistTab() {
      const { state, dispatch, t } = useContext(AppContext);
      const toast = useContext(ToastContext);
      const [showModal, setShowModal] = useState(false);
      const [editing, setEditing] = useState(null);
      const [deleteConfirm, setDeleteConfirm] = useState(null);
      const [form, setForm] = useState({ item: '', category: 'misc', assignedTo: '', checked: false });

      const packCategories = { clothes: '👕', toiletries: '🧴', electronics: '🔌', documents: '📄', medicine: '💊', misc: '📦' };
      const grouped = useMemo(() => {
        const g = {};
        state.packingList.forEach(item => {
          const cat = item.category || 'misc';
          if (!g[cat]) g[cat] = [];
          g[cat].push(item);
        });
        return g;
      }, [state.packingList]);

      const totalItems = state.packingList.length;
      const checkedItems = state.packingList.filter(i => i.checked).length;
      const progress = totalItems > 0 ? Math.round((checkedItems / totalItems) * 100) : 0;

      const openAdd = () => { setEditing(null); setForm({ item: '', category: 'misc', assignedTo: '', checked: false }); setShowModal(true); };
      const openEdit = (item) => { setEditing(item.id); setForm({ ...item }); setShowModal(true); };
      const handleSave = () => {
        if (!form.item) return toast('Nhập tên vật phẩm', 'error');
        if (editing) dispatch({ type: 'UPDATE_PACKING', payload: { ...form, id: editing } });
        else dispatch({ type: 'ADD_PACKING', payload: form });
        setShowModal(false); toast(editing ? 'Đã cập nhật' : 'Đã thêm');
      };
      const toggleCheck = (id) => {
        const item = state.packingList.find(i => i.id === id);
        dispatch({ type: 'UPDATE_PACKING', payload: { id, checked: !item.checked } });
      };

      const templateItems = {
        clothes: ['Áo thun', 'Quần dài', 'Quần short', 'Áo khoác', 'Đồ ngủ', 'Đồ lót', 'Tất/vớ', 'Giày dép'],
        toiletries: ['Bàn chải đánh răng', 'Kem đánh răng', 'Sữa tắm', 'Dầu gội', 'Kem chống nắng', 'Khăn mặt'],
        electronics: ['Sạc điện thoại', 'Pin dự phòng', 'Tai nghe', 'Máy ảnh', 'Adapter ổ cắm'],
        documents: ['Hộ chiếu', 'CMND/CCCD', 'Vé máy bay', 'Booking khách sạn', 'Bảo hiểm du lịch'],
        medicine: ['Thuốc cá nhân', 'Thuốc đau đầu', 'Thuốc tiêu hóa', 'Băng cá nhân', 'Thuốc chống say xe'],
        misc: ['Balo', 'Túi đựng đồ bẩn', 'Chai nước', 'Snack', 'Sách/tạp chí'],
      };

      const addTemplates = (cat) => {
        const existingNames = state.packingList.map(i => i.item.toLowerCase());
        const newItems = templateItems[cat]?.filter(name => !existingNames.includes(name.toLowerCase())).map(name => ({ item: name, category: cat, assignedTo: '', checked: false })) || [];
        if (newItems.length > 0) { dispatch({ type: 'BULK_ADD_PACKING', payload: newItems }); toast(`Đã thêm ${newItems.length} vật phẩm`); }
        else toast('Tất cả đã có trong danh sách', 'warning');
      };

      const getMember = (id) => state.members.find(m => m.id === id);

      return (
        <div className="tab-content pb-20">
          {/* Progress */}
          <div className="mx-4 mt-4 bg-white dark:bg-slate-800 rounded-xl p-4 shadow-sm">
            <div className="flex justify-between items-center mb-2">
              <p className="text-sm font-medium">{t.progress}</p>
              <p className="text-sm font-bold text-primary-500">{checkedItems}/{totalItems} ({progress}%)</p>
            </div>
            <div className="w-full h-2 bg-gray-100 dark:bg-slate-700 rounded-full overflow-hidden">
              <div className="h-full bg-primary-500 rounded-full transition-all duration-500" style={{ width: `${progress}%` }} />
            </div>
          </div>

          {/* Quick templates */}
          <div className="mx-4 mt-3 flex gap-2 overflow-x-auto pb-1">
            {Object.entries(packCategories).map(([k, v]) => (
              <button key={k} onClick={() => addTemplates(k)} className="flex-shrink-0 px-3 py-1.5 rounded-lg bg-gray-100 dark:bg-slate-800 text-xs whitespace-nowrap hover:bg-primary-50 dark:hover:bg-primary-900/30">
                {v} +{t[k] || k}
              </button>
            ))}
          </div>

          {totalItems === 0 ? <EmptyState icon="CheckSquare" message={t.noItems} /> : (
            <div className="mx-4 mt-4 space-y-4">
              {Object.entries(grouped).map(([cat, items]) => {
                const catChecked = items.filter(i => i.checked).length;
                return (
                  <div key={cat}>
                    <div className="flex items-center justify-between mb-2">
                      <p className="text-sm font-semibold">{packCategories[cat] || '📦'} {t[cat] || cat}</p>
                      <span className="text-xs text-gray-400">{catChecked}/{items.length}</span>
                    </div>
                    <div className="space-y-1">
                      {items.map(item => (
                        <div key={item.id} className="bg-white dark:bg-slate-800 rounded-xl p-3 flex items-center gap-3 shadow-sm">
                          <input type="checkbox" checked={item.checked} onChange={() => toggleCheck(item.id)} className="w-5 h-5 rounded accent-primary-500 flex-shrink-0" />
                          <span className={`flex-1 text-sm ${item.checked ? 'line-through text-gray-300 dark:text-slate-600' : ''}`}>{item.item}</span>
                          {item.assignedTo && getMember(item.assignedTo) && <span className="text-xs bg-gray-100 dark:bg-slate-700 px-2 py-0.5 rounded-full">{getMember(item.assignedTo)?.avatar} {getMember(item.assignedTo)?.name}</span>}
                          <button onClick={() => openEdit(item)} className="text-gray-300 hover:text-gray-500"><Icon name="Edit3" size={14} /></button>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
          <Fab onClick={openAdd} />

          <Modal isOpen={showModal} onClose={() => setShowModal(false)} title={editing ? t.edit : t.addItem}>
            <div className="space-y-4">
              <input className="ui-input" placeholder={t.item} value={form.item} onChange={e => setForm(f => ({...f, item: e.target.value}))} />
              <div className="flex gap-2 flex-wrap">
                {Object.entries(packCategories).map(([k, v]) => (
                  <button key={k} onClick={() => setForm(f => ({...f, category: k}))} className={`px-3 py-1.5 rounded-lg text-sm ${form.category === k ? 'bg-primary-500 text-white' : 'bg-gray-100 dark:bg-slate-700'}`}>{v} {t[k] || k}</button>
                ))}
              </div>
              <select className="ui-input" value={form.assignedTo} onChange={e => setForm(f => ({...f, assignedTo: e.target.value}))}>
                <option value="">{t.assignTo}</option>
                {state.members.map(m => <option key={m.id} value={m.id}>{m.avatar} {m.name}</option>)}
              </select>
              <div className="flex gap-2">
                {editing && <button onClick={() => setDeleteConfirm(editing)} className="ui-btn ui-btn-danger">{t.delete}</button>}
                <button onClick={handleSave} className="ui-btn ui-btn-primary flex-1">{t.save}</button>
              </div>
            </div>
          </Modal>
          <ConfirmDialog isOpen={!!deleteConfirm} onClose={() => setDeleteConfirm(null)} onConfirm={() => { dispatch({ type: 'DELETE_PACKING', payload: deleteConfirm }); setShowModal(false); toast('Đã xóa'); }} message={`${t.delete}?`} />
        </div>
      );
    }

    // ==================== TAB: SETTLE ====================
    function SettleTab() {
      const { state, t } = useContext(AppContext);
      const getMember = id => state.members.find(m => m.id === id);
      const rates = state.trip.exchangeRates || {};
      const base = state.trip.baseCurrency || 'VND';
      const convertToBase = (amount, currency) => {
        if (!currency || currency === base) return parseFloat(amount) || 0;
        const rate = rates[currency];
        return rate ? (parseFloat(amount) || 0) * rate : parseFloat(amount) || 0;
      };
      const balanceExpenses = state.expenses.filter(e => e.paidBy !== '__all__' && !e.fromFund).map(e => ({
        ...e,
        amount: convertToBase(e.amount, e.currency || base),
      }));
      const settlement = calculateSettlementProportional(balanceExpenses, state.members);

      return (
        <div className="px-4 py-4 space-y-5 pb-24">
          {/* Net Balances */}
          <div>
            <p className="ui-label mb-2">Số dư mỗi người</p>
            {state.members.length === 0 ? (
              <p className="text-sm text-gray-400 text-center py-4">Chưa có thành viên</p>
            ) : (
              <div className="grid grid-cols-2 gap-2">
                {state.members.map(m => {
                  const bal = Math.round(settlement.balances[m.id] || 0);
                  return (
                    <div key={m.id} className="flex items-center gap-2 bg-white dark:bg-slate-800 rounded-xl px-3 py-2.5 shadow-sm">
                      <span className="text-xl">{m.avatar}</span>
                      <span className="text-sm font-medium flex-1 truncate">{m.name}</span>
                      <span className={`text-sm font-bold tabular-nums ${bal > 0 ? 'text-emerald-500' : bal < 0 ? 'text-red-400' : 'text-gray-400'}`}>
                        {bal > 0 ? '+' : ''}{bal.toLocaleString()}
                      </span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {/* Transactions */}
          <div>
            <p className="ui-label mb-2">Giao dịch cần thực hiện</p>
            {settlement.txns.length === 0 ? (
              <div className="flex flex-col items-center py-12 gap-3 text-gray-400">
                <Icon name="CheckCircle2" size={48} className="text-emerald-400" />
                <p className="text-base font-medium">{t.noSettlement}</p>
              </div>
            ) : (
              <div className="space-y-2">
                {settlement.txns.map((tx, i) => (
                  <div key={i} className="flex items-center gap-2 bg-white dark:bg-slate-800 rounded-xl px-3 py-3 shadow-sm">
                    <span className="text-2xl">{getMember(tx.from)?.avatar}</span>
                    <div className="flex flex-col items-start min-w-0">
                      <span className="text-sm font-semibold truncate">{getMember(tx.from)?.name}</span>
                      <span className="text-[10px] text-red-400">nợ</span>
                    </div>
                    <div className="flex flex-col items-center flex-1 px-1">
                      <span className="font-bold text-primary-500 text-sm tabular-nums">{tx.amount.toLocaleString()} {base}</span>
                      <Icon name="ArrowRight" size={14} className="text-gray-400 mt-0.5" />
                    </div>
                    <div className="flex flex-col items-end min-w-0">
                      <span className="text-sm font-semibold truncate">{getMember(tx.to)?.name}</span>
                      <span className="text-[10px] text-emerald-400">nhận</span>
                    </div>
                    <span className="text-2xl">{getMember(tx.to)?.avatar}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ==================== TAB: SETTINGS ====================
    function SettingsTab() {
      const { state, dispatch, t } = useContext(AppContext);
      const toast = useContext(ToastContext);
      const [showMemberModal, setShowMemberModal] = useState(false);
      const [showContactModal, setShowContactModal] = useState(false);
      const [showRateModal, setShowRateModal] = useState(false);
      const [editingMember, setEditingMember] = useState(null);
      const [editingContact, setEditingContact] = useState(null);
      const [clearConfirm, setClearConfirm] = useState(false);
      const [memberForm, setMemberForm] = useState({ name: '', avatar: '😀' });
      const [contactForm, setContactForm] = useState({ name: '', phone: '', type: 'other' });
      const [rateForm, setRateForm] = useState({ currency: '', rate: '' });
      const fileRef = useRef();

      const emojis = ['😀','😎','🤓','🎨','🎵','🌟','🦊','🐱','🐶','🦁','🐼','🐸','🌸','🔥','💎','🎯','🚀','⭐','🌈','🍀'];
      const contactTypes = { police: '🚔', hospital: '🏥', embassy: '🏛️', taxi: '🚕', other: '📞' };

      const addMember = () => { setEditingMember(null); setMemberForm({ name: '', avatar: '😀' }); setShowMemberModal(true); };
      const editMember = (m) => { setEditingMember(m.id); setMemberForm({ name: m.name, avatar: m.avatar }); setShowMemberModal(true); };
      const saveMember = () => {
        if (!memberForm.name) return toast('Nhập tên', 'error');
        if (editingMember) dispatch({ type: 'UPDATE_MEMBER', payload: { id: editingMember, ...memberForm } });
        else dispatch({ type: 'ADD_MEMBER', payload: memberForm });
        setShowMemberModal(false); toast('Đã lưu');
      };
      const deleteMember = (id) => { dispatch({ type: 'DELETE_MEMBER', payload: id }); toast('Đã xóa'); };

      const addContact = () => { setEditingContact(null); setContactForm({ name: '', phone: '', type: 'other' }); setShowContactModal(true); };
      const editContact = (c) => { setEditingContact(c.id); setContactForm({ name: c.name, phone: c.phone, type: c.type }); setShowContactModal(true); };
      const saveContact = () => {
        if (!contactForm.name || !contactForm.phone) return toast('Nhập đầy đủ', 'error');
        if (editingContact) dispatch({ type: 'UPDATE_CONTACT', payload: { id: editingContact, ...contactForm } });
        else dispatch({ type: 'ADD_CONTACT', payload: contactForm });
        setShowContactModal(false); toast('Đã lưu');
      };

      const addRate = () => {
        if (!rateForm.currency || !rateForm.rate) return toast('Nhập đầy đủ', 'error');
        const rates = [...state.trip.exchangeRates.filter(r => r.currency !== rateForm.currency), rateForm];
        dispatch({ type: 'SET_RATES', payload: rates }); setRateForm({ currency: '', rate: '' }); toast('Đã thêm tỷ giá');
      };
      const deleteRate = (cur) => {
        dispatch({ type: 'SET_RATES', payload: state.trip.exchangeRates.filter(r => r.currency !== cur) });
      };

      const exportData = () => {
        const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = `travel-${state.trip.name}-${new Date().toISOString().split('T')[0]}.json`; a.click();
        URL.revokeObjectURL(url); toast('Đã xuất dữ liệu');
      };
      const importData = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            dispatch({ type: 'LOAD_STATE', payload: data });
            toast('Đã nhập dữ liệu');
          } catch { toast('File không hợp lệ', 'error'); }
        };
        reader.readAsText(file);
        e.target.value = '';
      };

      const setTheme = (theme) => {
        dispatch({ type: 'SET_SETTINGS', payload: { theme } });
        if (theme === 'dark') document.documentElement.classList.add('dark');
        else if (theme === 'light') document.documentElement.classList.remove('dark');
        else {
          if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.classList.add('dark');
          else document.documentElement.classList.remove('dark');
        }
      };

      return (
        <div className="tab-content pb-20 mx-4 mt-4 space-y-4">

          <div className="bg-white dark:bg-slate-800 rounded-xl p-4 shadow-sm space-y-3">

            <input className="ui-input" value={state.trip.name} onChange={e => dispatch({ type: 'SET_TRIP', payload: { name: e.target.value } })} />
            <div className="flex gap-2">
              <div className="flex-1">
                <label className="text-xs text-gray-400">{t.startDate}</label>
                <input type="date" className="ui-input ui-input-sm" value={state.trip.startDate} onChange={e => dispatch({ type: 'SET_TRIP', payload: { startDate: e.target.value } })} />
              </div>
              <div className="flex-1">
                <label className="text-xs text-gray-400">{t.endDate}</label>
                <input type="date" className="ui-input ui-input-sm" value={state.trip.endDate} onChange={e => dispatch({ type: 'SET_TRIP', payload: { endDate: e.target.value } })} />
              </div>
            </div>
          </div>

          {/* Members */}
          <div className="bg-white dark:bg-slate-800 rounded-xl p-4 shadow-sm">
            <div className="flex items-center justify-between mb-3">
              <p className="font-bold text-sm">{t.members} ({state.members.length})</p>
              <button onClick={addMember} className="text-xs text-primary-500 font-medium">{t.addMember}</button>
            </div>
            <div className="space-y-2">
              {state.members.map(m => (
                <div key={m.id} className="flex items-center gap-3 py-1">
                  <span className="text-xl">{m.avatar}</span>
                  <span className="flex-1 text-sm font-medium">{m.name}</span>

            </div>

            <p className="font-bold text-sm mb-3">{t.exchangeRates}</p>
            <div className="flex gap-2 mb-3">
              <div className="flex-1">
                <label className="text-xs text-gray-400">{t.baseCurrency}</label>

              <div className="space-y-2">
                {state.emergencyContacts.map(c => (
                  <div key={c.id} className="flex items-center gap-3 py-1">
                    <span>{contactTypes[c.type] || '📞'}</span>
                    <div className="flex-1">
                      <p className="text-sm font-medium">{c.name}</p>
                      <a href={`tel:${c.phone}`} className="text-xs text-primary-500">{c.phone}</a>
                    </div>
                    <button onClick={() => editContact(c)} className="text-gray-300 hover:text-gray-500"><Icon name="Edit3" size={14} /></button>
                    <button onClick={() => { dispatch({ type: 'DELETE_CONTACT', payload: c.id }); toast('Đã xóa'); }} className="text-gray-300 hover:text-red-500"><Icon name="Trash2" size={14} /></button>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Data */}
          <div className="bg-white dark:bg-slate-800 rounded-xl p-4 shadow-sm space-y-3">
            <p className="font-bold text-sm">Dữ liệu</p>
            <div className="flex gap-2">
              <button onClick={exportData} className="flex-1 py-2.5 rounded-xl bg-green-50 dark:bg-green-900/30 text-green-600 text-sm font-medium">{t.exportData}</button>
              <button onClick={() => fileRef.current?.click()} className="flex-1 py-2.5 rounded-xl bg-blue-50 dark:bg-blue-900/30 text-blue-600 text-sm font-medium">{t.importData}</button>
            </div>
            <input ref={fileRef} type="file" accept=".json" className="hidden" onChange={importData} />
            <button onClick={() => setClearConfirm(true)} className="w-full py-2.5 rounded-xl bg-red-50 dark:bg-red-900/30 text-red-500 text-sm font-medium">{t.clearData}</button>
          </div>

          {/* Member Modal */}
          <Modal isOpen={showMemberModal} onClose={() => setShowMemberModal(false)} title={editingMember ? t.edit : t.addMember}>
            <div className="space-y-4">
              <input className="ui-input" placeholder={t.name} value={memberForm.name} onChange={e => setMemberForm(f => ({...f, name: e.target.value}))} />
              <div>
                <p className="text-sm font-medium mb-2">{t.avatar}</p>
                <div className="flex flex-wrap gap-2">
                  {emojis.map(e => (
                    <button key={e} onClick={() => setMemberForm(f => ({...f, avatar: e}))} className={`w-10 h-10 rounded-lg flex items-center justify-center text-xl ${memberForm.avatar === e ? 'bg-primary-100 dark:bg-primary-900/40 ring-2 ring-primary-500' : 'bg-gray-50 dark:bg-slate-700'}`}>{e}</button>
                  ))}
                </div>
              </div>
              <button onClick={saveMember} className="ui-btn ui-btn-primary w-full">{t.save}</button>
            </div>
          </Modal>

          {/* Contact Modal */}
          <Modal isOpen={showContactModal} onClose={() => setShowContactModal(false)} title={editingContact ? t.edit : t.addContact}>
            <div className="space-y-4">
              <input className="ui-input" placeholder={t.name} value={contactForm.name} onChange={e => setContactForm(f => ({...f, name: e.target.value}))} />
              <input className="ui-input" placeholder={t.phone} value={contactForm.phone} onChange={e => setContactForm(f => ({...f, phone: e.target.value}))} />
              <div className="flex gap-2 flex-wrap">
                {Object.entries(contactTypes).map(([k, v]) => (
                  <button key={k} onClick={() => setContactForm(f => ({...f, type: k}))} className={`px-3 py-1.5 rounded-lg text-sm ${contactForm.type === k ? 'bg-primary-500 text-white' : 'bg-gray-100 dark:bg-slate-700'}`}>{v} {t[k] || k}</button>
                ))}
              </div>
              <button onClick={saveContact} className="ui-btn ui-btn-primary w-full">{t.save}</button>
            </div>
          </Modal>

          <ConfirmDialog isOpen={clearConfirm} onClose={() => setClearConfirm(false)} onConfirm={() => { dispatch({ type: 'CLEAR_ALL' }); toast('Đã xóa tất cả dữ liệu'); }} message={t.clearConfirm} />
        </div>
      );
    }

    // ==================== TAB: HISTORY ====================
    function HistoryTab() {
      const { state, dispatch, t } = useContext(AppContext);
      const toast = useContext(ToastContext);
      const [deleteConfirm, setDeleteConfirm] = useState(false);
      const history = (state.history || []).filter(h => historyLabels[h.action]);

      const formatTime = (iso) => {
        const d = new Date(iso);
        const now = new Date();
        const diff = now - d;
        if (diff < 60000) return 'Vừa xong';
        if (diff < 3600000) return Math.floor(diff / 60000) + ' phút trước';
        if (diff < 86400000) return Math.floor(diff / 3600000) + ' giờ trước';
        if (diff < 172800000) return 'Hôm qua ' + d.toLocaleTimeString('vi', { hour: '2-digit', minute: '2-digit' });
        return d.toLocaleDateString('vi', { day: '2-digit', month: '2-digit' }) + ' ' + d.toLocaleTimeString('vi', { hour: '2-digit', minute: '2-digit' });
      };

      const grouped = useMemo(() => {
        const g = {};
        history.forEach(h => {
          const d = new Date(h.timestamp);
          const key = d.toLocaleDateString('vi', { weekday: 'long', day: '2-digit', month: '2-digit', year: 'numeric' });
          if (!g[key]) g[key] = [];
          g[key].push(h);
        });
        return g;
      }, [history]);

      return (
        <div className="tab-content">
          <div className="mx-4 mt-4 flex items-center justify-between">
            <h2 className="text-lg font-bold">📋 Lịch sử hoạt động</h2>
            {history.length > 0 && (
              <button onClick={() => setDeleteConfirm(true)} className="text-xs text-red-400 hover:text-red-500 flex items-center gap-1">
                <Icon name="Trash2" size={12} /> Xóa lịch sử
              </button>
            )}
          </div>

          {history.length === 0 ? (
            <EmptyState icon="Clock" message="Chưa có hoạt động nào" />
          ) : (
            <div className="mx-4 mt-3 space-y-4">
              {Object.entries(grouped).map(([date, items]) => (
                <div key={date}>
                  <p className="text-xs font-semibold text-gray-400 mb-2">{date}</p>
                  <div className="space-y-1.5">
                    {items.map(h => {
                      const label = historyLabels[h.action] || { icon: '📌', text: h.action };
                      return (
                        <div key={h.id} className="flex items-center gap-3 bg-white dark:bg-slate-800 rounded-xl px-3 py-2.5 shadow-sm">
                          <span className="text-lg">{label.icon}</span>
                          <div className="flex-1 min-w-0">
                            <p className="text-sm font-medium">{label.text}</p>
                            {h.detail && <p className="text-xs text-gray-400 truncate">{h.detail}</p>}
                          </div>
                          <span className="text-[10px] text-gray-400 whitespace-nowrap">{formatTime(h.timestamp)}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
          )}

          <ConfirmDialog isOpen={deleteConfirm} onClose={() => setDeleteConfirm(false)} onConfirm={() => {
            dispatch({ type: 'CLEAR_HISTORY' });
            setDeleteConfirm(false);
            toast('Đã xóa lịch sử');
          }} message="Xóa toàn bộ lịch sử?" />
        </div>
      );
    }

    // ==================== MAIN APP ====================
    function App() {
      const toast = useContext(ToastContext);
      const [activeTab, setActiveTab] = useState(0);
      const [state, rawDispatch] = useReducer(appReducer, defaultState);
      const dispatch = useCallback((action) => {
        rawDispatch(action);
        if (historyLabels[action.type]) {
          const detail = getHistoryDetail(action.type, action.payload);
          rawDispatch({ type: 'ADD_HISTORY', payload: {
            id: Date.now().toString(36) + Math.random().toString(36).substr(2, 5),
            action: action.type,
            detail,
            timestamp: new Date().toISOString(),
          }});
        }
      }, []);
      const initialized = useRef(false);
      const isSyncing = useRef(false);

      // ── Trip ID (dùng cho Firestore document ID) ──
      const tripId = useRef((() => {
        const hash = window.location.hash.replace('#', '');
        if (hash && hash.length > 8) {
          localStorage.setItem('travel-tripId', hash);
          return hash;
        }
        let id = localStorage.getItem('travel-tripId');
        if (!id) {
          id = ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
            (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16));
          localStorage.setItem('travel-tripId', id);
        }
        if (window.location.hash !== '#' + id) window.location.hash = id;
        return id;
      })());

      // Load từ localStorage (instant) + Firestore real-time
      useEffect(() => {
        // 1. Load localStorage trước
        try {
          const saved = localStorage.getItem('travel-companion-data');
          if (saved) dispatch({ type: 'LOAD_STATE', payload: JSON.parse(saved) });
        } catch {}

        // 2. Subscribe Firestore (nếu đã cấu hình)
        if (!window._firebaseReady) {
          initialized.current = true;
          return;
        }
        const unsub = window._db.collection('trips').doc(tripId.current)
          .onSnapshot(doc => {
            if (doc.exists && !isSyncing.current) {
              const data = doc.data();
              // Giữ ảnh từ localStorage (base64 quá lớn cho Firestore)
              try {
                const local = JSON.parse(localStorage.getItem('travel-companion-data') || '{}');
                dispatch({ type: 'LOAD_STATE', payload: { ...data, photos: local.photos || [] } });
              } catch {
                dispatch({ type: 'LOAD_STATE', payload: data });
              }
            }
            initialized.current = true;
          }, () => { initialized.current = true; });
        return () => unsub();
      }, []);

      // Save localStorage + Firestore (debounced)
      useEffect(() => {
        if (!initialized.current) return;
        const timer = setTimeout(() => {
          try {
            localStorage.setItem('travel-companion-data', JSON.stringify(state));
          } catch (e) {
            console.warn('localStorage quota exceeded');
          }
          // Sync lên Firestore (bỏ photos)
          if (window._firebaseReady) {
            const { photos, ...toCloud } = state;
            isSyncing.current = true;
            window._db.collection('trips').doc(tripId.current)
              .set(toCloud)
              .then(() => { setTimeout(() => { isSyncing.current = false; }, 200); })
              .catch(console.warn);
          }
        }, 800);
        return () => clearTimeout(timer);
      }, [state]);

      // Theme init
      useEffect(() => {
        const theme = state.settings.theme;
        if (theme === 'dark') document.documentElement.classList.add('dark');
        else if (theme === 'light') document.documentElement.classList.remove('dark');
        else {
          const mq = window.matchMedia('(prefers-color-scheme: dark)');
          const handler = (e) => { e.matches ? document.documentElement.classList.add('dark') : document.documentElement.classList.remove('dark'); };
          handler(mq); mq.addEventListener('change', handler);
          return () => mq.removeEventListener('change', handler);
        }
      }, [state.settings.theme]);

      const t = translations[state.settings.language] || translations.vi;

      const tabs = [
        { icon: 'Receipt', label: t.expenses },
        { icon: 'MapPin', label: t.places },
        { icon: 'Calendar', label: t.schedule },
        { icon: 'RefreshCw', label: 'Chốt nợ' },
        { icon: 'Clock', label: 'Lịch sử' },
        { icon: 'Settings', label: t.settings },
      ];

      const tabComponents = [ExpensesTab, PlacesTab, ScheduleTab, SettleTab, HistoryTab, SettingsTab];
      const ActiveComponent = tabComponents[activeTab];

      return (
        <ToastProvider>
          <AppContext.Provider value={{ state, dispatch, t }}>
            <div className="min-h-screen max-w-lg mx-auto relative bg-gray-50 dark:bg-slate-900">
              {/* Header */}
              <header className="sticky top-0 z-40 px-4 py-3 mx-3 mt-3 mb-1 rounded-2xl" style={{background:'#8b5c3a', border:'2px solid #5c3320', boxShadow:'4px 4px 0 #5c3320'}}>
                <div className="flex items-center justify-between">
                  <div>
                    <h1 className="text-lg font-bold" style={{color:'var(--bg-card)'}}>{state.trip.name || 'Travel Companion'}</h1>
                    {state.trip.startDate && <p className="text-xs" style={{color:'var(--border-light)'}}>{state.trip.startDate} → {state.trip.endDate}</p>}
                  </div>
                  <div className="flex items-center gap-1">
                    <button onClick={() => {
                      const themes = ['light', 'dark', 'auto'];
                      const idx = themes.indexOf(state.settings.theme);
                      const next = themes[(idx + 1) % 3];
                      dispatch({ type: 'SET_SETTINGS', payload: { theme: next } });
                      if (next === 'dark') document.documentElement.classList.add('dark');
                      else if (next === 'light') document.documentElement.classList.remove('dark');
                      else {
                        if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.classList.add('dark');
                        else document.documentElement.classList.remove('dark');
                      }
                    }} className="p-2 rounded-lg transition" style={{color:'var(--bg-card)'}}>
                      <Icon name={state.settings.theme === 'dark' ? 'Moon' : state.settings.theme === 'light' ? 'Sun' : 'Monitor'} size={18} />
                    </button>
                    <button onClick={() => dispatch({ type: 'SET_SETTINGS', payload: { language: state.settings.language === 'vi' ? 'en' : 'vi' } })} className="p-2 rounded-lg text-xs font-bold" style={{color:'var(--bg-card)'}}>
                      {state.settings.language === 'vi' ? '🇻🇳' : '🇬🇧'}
                    </button>
                    <button onClick={() => {
                      const url = window.location.href;
                      if (navigator.share) {
                        navigator.share({ title: state.trip.name, url });
                      } else if (navigator.clipboard) {
                        navigator.clipboard.writeText(url).then(() => toast('📋 Đã copy link!')).catch(() => {
                          prompt('Copy link này:', url);
                        });
                      } else {
                        prompt('Copy link này:', url);
                      }
                    }} className="p-2 rounded-lg transition" style={{color:'var(--bg-card)'}} title="Chia sẻ chuyến đi">
                      <Icon name="Share2" size={18} />
                    </button>
                  </div>
                </div>
              </header>

              {/* Content */}
              <main className="pb-20">
                <ActiveComponent />
              </main>

              {/* Bottom Navigation */}
              <nav className="fixed bottom-0 left-0 right-0 max-w-lg mx-auto z-40" style={{background:'#8b5c3a'}}>
                <div className="flex justify-around py-2">
                  {tabs.map((tab, idx) => (
                    <button key={idx} onClick={() => setActiveTab(idx)}
                      className="flex flex-col items-center gap-0.5 px-2 py-1 rounded-lg transition-all min-w-[48px]"
                      style={{color: activeTab === idx ? 'var(--bg-card)' : 'rgba(253,246,238,0.45)', fontWeight: activeTab === idx ? 700 : 500}}>
                      <Icon name={tab.icon} size={20} />
                      <span className="text-[10px]">{tab.label}</span>
                    </button>
                  ))}
                </div>
                <div className="h-[env(safe-area-inset-bottom)]" />
              </nav>
            </div>
          </AppContext.Provider>
        </ToastProvider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
